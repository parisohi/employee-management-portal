<div class="settings-container">
    <div class="settings-card">

        <h2>⚙️ {{'SETTINGS.TITLE' | translate}}</h2>

        <form [formGroup]="settingsForm" (ngSubmit)="saveSettings()">
            <div class="form-group">

                <label>{{'SETTINGS.ADMIN_NAME' | translate}}</label>

                <input type="text" placeholder="Enter Admin Name" formControlName="adminName">
            </div>

            <div class="form-group">

                <label>{{'SETTINGS.EMAIL' | translate}}</label>

                <input type="email" placeholder="Enter Email" formControlName="email">
            </div>

            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" formControlName="notifications">
                    {{'SETTINGS.NOTIFICATIONS' | translate}}
                </label>
            </div>

            <div class="form-group">
                <mat-slide-toggle formControlName="darkMode">
                    {{'SETTINGS.DARK_MODE' | translate}}
                </mat-slide-toggle>
            </div>

            <div class="form-group">
                <label>{{'SETTINGS.LANGUAGE' |translate}}</label>

                <select formControlName="language">
                    <option value="English">English</option>
                    <option value="Hindi">Hindi</option>
                    <option value="Punjabi">Punjabi</option>
                </select>
            </div>

            <div class="button-group">
                <button type="submit">
                    {{'SETTINGS.SAVE' | translate}}
                </button>

                <button type="reset" (click)="resetSettings()">
                    {{'SETTINGS.RESET' | translate}}
                </button>
            </div>
        </form>
    </div>
</div>
